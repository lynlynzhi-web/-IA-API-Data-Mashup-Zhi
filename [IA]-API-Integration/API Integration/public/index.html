<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Wheel | Lead Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section id="page-header">
        <h2>Lead Form</h2>
        <p>Send us your questions and we will get back to you as soon as possible.</p>
    </section>

    <main class="page">
        <div class="form-layout">
            <aside class="logo-panel">
                <img src="logo-2.png" alt="Kitchen Wheel logo">
            </aside>

            <section class="form-panel">
                <form id="leadForm">
                    <input type="text" id="name" placeholder="Name" required />
                    <br><br>

                    <input type="email" id="email" placeholder="Email" required />
                    <br><br>

                    <textarea id="message" placeholder="Please enter your questions here." required></textarea>
                    <br><br>

                    <button type="submit" id="submitBtn">Submit</button>
                </form>

                <p id="status"></p>
            </section>
        </div>
    </main>

    <footer class="section-p1" id="contact-footer">
        <div>
            <h4>Contact Us</h4>
            <p><strong>Address:</strong> Quezon City, Manila, Philippines</p>
            <p><strong>Phone:</strong> +63 912 345 6789</p>
            <p><strong>Delivery Hours:</strong> Morning (6:00AM - 10:00AM), Evening (5:00PM-9:00PM)</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
